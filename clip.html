<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeFlow Music - Accès Privé Sécurisé</title>
    <style>
        :root {
            --fond: #000000;
            --boite: #0a0a0f;
            --violet: #8a2be2;
            --rose: #ff007f;
            --texte: #ffffff;
        }

        body { 
            background-color: var(--fond); 
            color: var(--texte); 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
            padding: 40px 20px;
            margin: 0;
        }

        /* Boîte de connexion */
        .box { 
            max-width: 400px; 
            margin: 10% auto 0 auto; 
            background: var(--boite); 
            padding: 40px 30px; 
            border-radius: 20px; 
            border: 2px solid var(--violet);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.35);
        }

        h2 {
            color: var(--texte);
            margin-bottom: 5px;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        p {
            color: #a0a0a5;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        
        input { 
            width: 85%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--violet); 
            background: #000000; 
            color: var(--texte); 
            text-align: center; 
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--rose);
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.5);
        }

        button { 
            width: 90%;
            padding: 12px; 
            background: linear-gradient(45deg, var(--violet), var(--rose)); 
            color: var(--texte); 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        }

        .erreur { 
            color: var(--rose); 
            display: none; 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 0.9rem;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.3);
        }

        /* Zone du lecteur vidéo */
        #zone-video {
            display: none;
            max-width: 850px;
            margin: 20px auto 0 auto;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ffffff, var(--rose));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-container { 
            aspect-ratio: 16/9; 
            background: #000000; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid var(--rose);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.4);
            margin-bottom: 40px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .btn-retour { 
            color: var(--texte); 
            text-decoration: none; 
            font-weight: bold; 
            border: 2px solid var(--violet);
            padding: 12px 24px;
            border-radius: 8px;
            background: rgba(138, 43, 226, 0.05);
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-retour:hover {
            background: var(--violet);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="box" id="ecran-connexion">
        <h2>🎬 CLIP EXCLUSIF</h2>
        <p>Entrez le code secret pour accéder à la vidéo d'Hanaé.</p>
        
        <input type="password" id="code-secret" placeholder="Mot de passe secret">
        <br>
        <button id="btn-valider">Déverrouiller le clip</button>
        
        <p id="message-erreur" class="erreur">❌ Code secret incorrect !</p>
    </div>

    <div id="zone-video">
        <h1>🍿 Bon visionnage !</h1>
        <p style="color: #a0a0a5; font-size: 0.9rem; margin-bottom: 30px;">Merci de garder ce contenu privé.</p>

        <div class="video-container" id="emplacement-video">
            </div>

        <br>
        <a href="index.html" class="btn-retour">← Retour au site</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8K0QUGr3xUSra2q_feHGrAjt0qAfrKY8",
            authDomain: "treeflow-music.firebaseapp.com",
            projectId: "treeflow-music",
            storageBucket: "treeflow-music.firebasestorage.app",
            messagingSenderId: "330986852150",
            appId: "1:330986852150:web:d57958930fa75b9504ad97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function verifierCode() {
            const codeSaisi = document.getElementById('code-secret').value;
            const erreur = document.getElementById('message-erreur');

            try {
                const docRef = doc(db, "configuration", "clip_prive");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const codeCorrect = docSnap.data().mot_de_passe;

                    if (codeSaisi === codeCorrect) {
                        erreur.style.display = "none";
                        document.getElementById('ecran-connexion').style.display = 'none';
                        
                        // Utilisation du flux direct Google Drive pour contourner le blocage d'écran noir
                        const idVideo = "1Rk_FX1qg5jaqCm3UWtV9DEbJMtwbLKc8";
                        const fluxDirect = `https://docs.google.com/uc?export=download&id=${idVideo}`;
                        
                        // On injecte un vrai lecteur vidéo HTML5 avec contrôles, sans l'iframe de partage
                        // "controlsList='nodownload'" empêche d'avoir le bouton télécharger sur le lecteur
                        document.getElementById('emplacement-video').innerHTML = `
                            <video controls controlsList="nodownload" oncontextmenu="return false;">
                                <source src="${fluxDirect}" type="video/mp4">
                                Votre navigateur ne supporte pas la lecture de cette vidéo.
                            </video>
                        `;
                        
                        document.getElementById('zone-video').style.display = 'block';
                    } else {
                        erreur.style.display = "block";
                        document.getElementById('code-secret').value = "";
                    }
                }
            } catch (error) {
                console.error("Erreur :", error);
            }
        }

        document.getElementById('btn-valider').addEventListener('click', verifierCode);
    </script>

</body>
</html>
