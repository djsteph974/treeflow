<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeFlow Music - Accès Privé Sécurisé</title>
    <style>
        :root {
            --fond: #000000;
            --boite: #0a0a0f;
            --violet: #8a2be2;
            --rose: #ff007f;
            --texte: #ffffff;
        }

        body { 
            background-color: var(--fond); 
            color: var(--texte); 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box { 
            width: 100%;
            max-width: 400px; 
            background: var(--boite); 
            padding: 30px 20px; 
            border-radius: 20px; 
            border: 2px solid var(--violet);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.35);
            box-sizing: border-box;
        }

        h2 {
            color: var(--texte);
            margin-bottom: 5px;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        p {
            color: #a0a0a5;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }
        
        input { 
            width: 85%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--violet); 
            background: #000000; 
            color: var(--texte); 
            text-align: center; 
            font-size: 1rem;
            outline: none;
        }

        button, .btn-whatsapp { 
            width: 90%;
            padding: 12px; 
            background: linear-gradient(45deg, var(--violet), var(--rose)); 
            color: var(--texte); 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }

        button:hover, .btn-whatsapp:hover {
            transform: scale(1.03);
        }

        .btn-whatsapp {
            background: #25D366;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .erreur { 
            color: var(--rose); 
            display: none; 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 0.9rem;
        }

        #zone-video {
            display: none;
            width: 100%;
            max-width: 640px;
            margin-top: 10px;
        }

        .video-container { 
            width: 100%;
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--violet);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
            margin-bottom: 15px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* Calque de protection absolue sur l'iframe de YouTube */
        .vitre-totale {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 9999;
            pointer-events: auto; 
        }

        .vitre-totale.passante {
            pointer-events: none;
        }

        .btn-controle {
            background: linear-gradient(45deg, var(--violet), var(--rose));
            color: var(--texte);
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            min-width: 150px;
            margin-left: auto;
            margin-right: auto;
            gap: 0;
            transition: background 0.3s;
        }

        .btn-controle:hover {
             background: linear-gradient(45deg, var(--rose), var(--violet));
        }

        .btn-retour { 
            color: var(--texte); 
            text-decoration: none; 
            font-weight: bold; 
            border: 2px solid var(--violet);
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(138, 43, 226, 0.05);
            display: inline-block;
            margin-top: 10px;
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div class="box" id="ecran-connexion">
        <h2>🎬 CLIP EXCLUSIF</h2>
        <p id="statut-chargement">Vérification de votre accès en cours...</p>
        
        <div id="champs-connexion" style="display: none;">
            <input type="password" id="code-secret" placeholder="Mot de passe secret">
            <br>
            <button id="btn-valider">DÉVERROUILLER LE CLIP</button>
            
            <a href="https://wa.me/33621210112?text=Bonjour,%20je%20souhaite%20obtenir%20le%20mot%20de%20passe%20pour%20le%20clip%20exclusif%20!" 
               target="_blank" class="btn-whatsapp">
               💬 DEMANDER LE CODE SUR WHATSAPP
            </a>
        </div>
        
        <p id="message-erreur" class="erreur">❌ Code secret incorrect !</p>
    </div>

    <div id="zone-video">
        <p style="color: #a0a0a5; font-size: 0.85rem; margin-bottom: 20px;">Merci de garder ce contenu privé.</p>

        <div class="video-container">
            <div id="calque-protecteur" class="vitre-totale"></div>
            <div id="player"></div>
        </div>

        <button id="btn-play-pause" class="btn-controle">LECTURE</button>
        <br>

        <a href="index.html" class="btn-retour">← Retour au site</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8K0QUGr3xUSra2q_feHGrAjt0qAfrKY8",
            authDomain: "treeflow-music.firebaseapp.com",
            projectId: "treeflow-music",
            storageBucket: "treeflow-music.firebasestorage.app",
            messagingSenderId: "330986852150",
            appId: "1:330986852150:web:d57958930fa75b9504ad97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let player;
        let userIP = "";
        const idVideo = "uu4Cz_SEcEg";

        function genererNouveauCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        async function obtenirIPEtVerifier() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIP = data.ip.replace(/\./g, '_'); 
                
                const ipRef = doc(db, "utilisateurs_autorises", userIP);
                const ipSnap = await getDoc(ipRef);
                
                if (ipSnap.exists()) {
                    afficherVideo();
                } else {
                    document.getElementById('statut-chargement').innerText = "Entrez le code secret pour accéder à la vidéo d'Hanaé.";
                    document.getElementById('champs-connexion').style.display = "block";
                }
            } catch (error) {
                console.error("Erreur de vérification IP :", error);
                document.getElementById('statut-chargement').innerText = "Entrez le code secret pour accéder à la vidéo d'Hanaé.";
                document.getElementById('champs-connexion').style.display = "block";
            }
        }

        async function verifierCode() {
            const codeSaisi = document.getElementById('code-secret').value;
            const erreur = document.getElementById('message-erreur');

            try {
                const docRef = doc(db, "configuration", "clip_prive");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const codeCorrect = docSnap.data().mot_de_passe;

                    if (codeSaisi === codeCorrect) {
                        erreur.style.display = "none";
                        
                        if (userIP) {
                            await setDoc(doc(db, "utilisateurs_autorises", userIP), {
                                autorise: true,
                                date_validation: new Date().toISOString()
                            });
                        }

                        const nouveauCode = genererNouveauCode();
                        await updateDoc(docRef, {
                            mot_de_passe: nouveauCode
                        });

                        afficherVideo();
                    } else {
                        erreur.innerText = "❌ Code secret incorrect !";
                        erreur.style.display = "block";
                        document.getElementById('code-secret').value = "";
                    }
                }
            } catch (error) {
                console.error("Erreur Firebase :", error);
                erreur.innerText = "❌ Erreur de connexion à la base de données.";
                erreur.style.display = "block";
            }
        }

        function afficherVideo() {
            document.getElementById('ecran-connexion').style.display = 'none';
            document.getElementById('zone-video').style.display = 'block';
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: idVideo,
                playerVars: {
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'fs': 0,
                    'disablekb': 1
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('btn-play-pause');
            if (event.data == YT.PlayerState.PLAYING) {
                btn.innerHTML = "PAUSE";
            } else {
                btn.innerHTML = "LECTURE";
            }
        }

        document.getElementById('btn-play-pause').addEventListener('click', () => {
            if (player && player.getPlayerState) {
                const calque = document.getElementById('calque-protecteur');
                const etat = player.getPlayerState();

                if (etat == YT.PlayerState.PLAYING) {
                    player.pauseVideo();
                } else {
                    if (calque) calque.classList.add('passante');
                    player.playVideo();
                    setTimeout(() => {
                        if (calque) calque.classList.remove('passante');
                    }, 150);
                }
            }
        });

        document.getElementById('btn-valider').addEventListener('click', verifierCode);
        
        obtenirIPEtVerifier();
    </script>
</body>
</html>
