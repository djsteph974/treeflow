<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>TreeFlow Music</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; margin: 0 auto; position: relative; }
        .header-sticky { position: sticky; top: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #bc13fe; background-image: url('https://lh3.googleusercontent.com/d/1yFhw6NB5g3Owfk40mzET56kMjJf5QOSu'); background-size: cover; background-position: center; overflow: hidden; }
        .header-sticky-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); z-index: -1; }
        .share-btn { position: absolute; top: 15px; left: 15px; cursor: pointer; z-index: 10; }
        .like-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
        .like-btn:active { transform: scale(1.2); }
        #like-counter { font-size: 12px; color: #bc13fe; margin-top: 2px; font-weight: bold; }
        .jaquette-container { width: 50%; aspect-ratio: 1/1; margin: 10px auto; background-image: url('https://lh3.googleusercontent.com/d/1vsktKnp28H1JwhJeORR-UJsuaT-UItjI'); background-size: cover; background-position: center; border: 2px solid #bc13fe; cursor: pointer; position: relative; z-index: 1; }
        #track-info { width: 100%; padding: 10px 15px; background: rgba(17, 17, 17, 0.7); box-sizing: border-box; text-align: center; }
        #current-title { font-size: 22px; margin: 0 0 5px 0; font-weight: bold; transition: opacity 0.5s; }
        #current-artist-album { font-size: 14px; margin: 0; color: #bc13fe; transition: opacity 0.5s; }
        .fade-out { opacity: 0; }
        .controls-container { width: 95%; margin: 10px auto; display: flex; align-items: center; gap: 10px; padding: 10px; background: #111; border-radius: 10px; box-sizing: border-box; }
        #play-pause-btn { background: #bc13fe; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        #play-pause-btn svg { width: 22px; height: 22px; fill: white; }
        #icon-pause { display: none; }
        #progress-bar { flex-grow: 1; accent-color: #bc13fe; cursor: pointer; }
        .track-list { width: 95%; margin: 10px auto; padding-bottom: 20px; }
        .track { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .track-info-text { cursor: pointer; flex-grow: 1; }
        .track h3 { margin: 0 0 5px 0; font-size: 16px; }
        .track p { margin: 0; font-size: 12px; color: #bc13fe; display: flex; align-items: center; gap: 8px; }
        .play-count { color: #888; font-size: 11px; font-style: italic; }
        .download-btn { background: none; border: none; cursor: pointer; padding: 5px; }
        .download-btn svg { width: 24px; height: 24px; fill: #bc13fe; }
        #lyrics-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: center; }
        #lyrics-content { font-size: 16px; line-height: 1.8; margin-top: 40px; white-space: pre-line; color: #ddd; }
        .close-lyrics { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: #bc13fe; }
    </style>
</head>
<body>
    <div id="lyrics-overlay"><span class="close-lyrics" onclick="toggleLyrics()">×</span><h2 id="lyrics-title" style="color: #bc13fe;">Paroles</h2><div id="lyrics-content"></div></div>
    
    <div class="container">
        <div class="header-sticky">
            <div class="header-sticky-blur"></div>
            <div class="share-btn" onclick="handleShare()"><svg width="26" height="26" viewBox="0 0 24 24" fill="#bc13fe"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg></div>
            <div class="like-btn" onclick="handleLikeClick()">
                <svg id="like-svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#bc13fe" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                <div id="like-counter">...</div>
            </div>
            <div class="jaquette-container" onclick="toggleLyrics()"></div>
            <div id="track-info"><h2 id="current-title">Chargement...</h2><p id="current-artist-album">Hanaé</p></div>
            <div class="controls-container">
                <button id="play-pause-btn" onclick="togglePlay()">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <input type="range" id="progress-bar" value="0" max="100">
            </div>
            <audio id="audio-element"></audio>
        </div>
        <div class="track-list" id="track-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8K0QUGr3xUSra2q_feHGrAjt0qAfrKY8",
            authDomain: "treeflow-music.firebaseapp.com",
            projectId: "treeflow-music",
            storageBucket: "treeflow-music.firebasestorage.app",
            messagingSenderId: "330986852150",
            appId: "1:330986852150:web:d57958930fa75b9504ad97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const likeRef = doc(db, "stats", "album_une_chanson_douce_instru");
        const trackStatsRef = doc(db, "stats", "track_stats_douce_instru");

        const playlist = [
            { id: 'bonne_fete', title: 'Bonne Fête Maman (Version Instrumentale)', album: 'Une Chanson Douce - Instru', url: 'https://archive.org/download/04-la-grace-de-la-fleur/01%20-%20HANAE%20-%20BONNE%20FETE%20MAMAN.mp3', lyrics: "..." },
            { id: 'maman_je_taime', title: 'Maman Je t\'aime (Version Instrumentale)', album: 'Une Chanson Douce - Instru', url: 'https://archive.org/download/04-la-grace-de-la-fleur/02%20-%20HANAE%20-%20MAMAN%20JE%20T%20AIME.mp3', lyrics: "..." },
            { id: 'chanson_douce', title: 'Une Chanson Douce (Version Instrumentale)', album: 'Une Chanson Douce - Instru', url: 'https://archive.org/download/04-la-grace-de-la-fleur/03%20-%20HANAE%20-%20UNE%20CHANSON%20DOUCE.mp3', lyrics: "..." },
            { id: 'grace_fleur', title: 'La Grâce de la Fleur (Version Instrumentale)', album: 'Une Chanson Douce - Instru', url: 'https://archive.org/download/04-la-grace-de-la-fleur/04%20-%20LA%20GRACE%20DE%20LA%20FLEUR.mp3', lyrics: "..." }
        ];

        const audio = document.getElementById('audio-element');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const progressBar = document.getElementById('progress-bar');
        const currentTitle = document.getElementById('current-title');
        const currentArtistAlbum = document.getElementById('current-artist-album');
        const counterDisplay = document.getElementById('like-counter');
        const likeSvg = document.getElementById('like-svg');
        let currentIndex = parseInt(localStorage.getItem('instru_index')) || 0;

        // --- SYNCHRO TEMPS RÉEL ---
        onSnapshot(likeRef, (snap) => { if (snap.exists()) counterDisplay.innerText = snap.data().count; });
        
        onSnapshot(trackStatsRef, (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                playlist.forEach(track => {
                    const el = document.getElementById(`count-${track.id}`);
                    if (el) el.innerText = `${data[track.id] || 0} écoutes`;
                });
            }
        });

        window.handleLikeClick = async () => {
            if (!localStorage.getItem('liked_album_instru')) {
                try {
                    await updateDoc(likeRef, { count: increment(1) });
                    localStorage.setItem('liked_album_instru', 'true');
                    likeSvg.style.fill = "#bc13fe";
                } catch(e) { console.error(e); }
            }
        };

        if (localStorage.getItem('liked_album_instru')) likeSvg.style.fill = "#bc13fe";

        // --- LECTEUR AUDIO ---
        window.playTrack = async (index, startTime = 0) => {
            currentIndex = index;
            const track = playlist[index];
            localStorage.setItem('instru_index', currentIndex);
            
            // 1. Incrémentation immédiate dans Firebase
            try {
                await updateDoc(trackStatsRef, { [track.id]: increment(1) });
            } catch(e) { console.error("Erreur stats", e); }

            // 2. Interface
            currentTitle.classList.add('fade-out');
            
            setTimeout(() => {
                audio.src = track.url;
                currentTitle.innerText = track.title;
                currentArtistAlbum.innerText = "Hanaé - " + track.album;
                currentTitle.classList.remove('fade-out');
                audio.currentTime = startTime;

                // 3. Lecture avec gestion d'erreur (autoplay block)
                audio.play().then(() => {
                    iconPlay.style.display = "none"; 
                    iconPause.style.display = "block"; 
                }).catch(e => {
                    console.log("Autoplay bloqué, attente clic utilisateur.");
                    iconPlay.style.display = "block"; 
                    iconPause.style.display = "none";
                });
            }, 500);
        };

        window.togglePlay = () => { 
            if (audio.paused) { audio.play(); iconPlay.style.display = "none"; iconPause.style.display = "block"; } 
            else { audio.pause(); iconPlay.style.display = "block"; iconPause.style.display = "none"; }
        };

        window.toggleLyrics = () => {
            const overlay = document.getElementById('lyrics-overlay');
            if (overlay.style.display === 'block') overlay.style.display = 'none';
            else { 
                document.getElementById('lyrics-content').innerText = playlist[currentIndex].lyrics; 
                document.getElementById('lyrics-title').innerText = playlist[currentIndex].title; 
                overlay.style.display = 'block'; 
            }
        };

        window.handleShare = () => { if (navigator.share) navigator.share({ title: 'TreeFlow Music', url: window.location.href }); };

        const listDiv = document.getElementById('track-list');
        playlist.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = 'track';
            div.innerHTML = `
                <div class="track-info-text" onclick="playTrack(${index})">
                    <h3>${track.title}</h3>
                    <p>Hanaé <span class="play-count" id="count-${track.id}">0 écoutes</span></p>
                </div>
                <a href="${track.url}" download class="download-btn">
                    <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
                </a>`;
            listDiv.appendChild(div);
        });

        audio.ontimeupdate = () => { if (audio.duration) progressBar.value = (audio.currentTime / audio.duration) * 100; };
        progressBar.oninput = () => { audio.currentTime = (progressBar.value / 100) * audio.duration; };
        audio.onended = () => { if (currentIndex < playlist.length - 1) window.playTrack(currentIndex + 1); };

        // Démarrage au chargement
        window.addEventListener('load', () => {
            window.playTrack(currentIndex, 0);
        });
    </script>
</body>
</html>
