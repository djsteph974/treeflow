<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dizzeur v1.5.8.1</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; margin: 0 auto; position: relative; }
        .header-sticky { position: sticky; top: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #bc13fe; background-image: url('https://lh3.googleusercontent.com/d/1yFhw6NB5g3Owfk40mzET56kMjJf5QOSu'); background-size: cover; background-position: center; overflow: hidden; }
        .header-sticky-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); z-index: -1; }
        .share-btn { position: absolute; top: 15px; left: 15px; cursor: pointer; z-index: 10; }
        
        .like-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
        .like-btn:active { transform: scale(1.2); }
        #like-counter { font-size: 12px; color: #bc13fe; margin-top: 2px; font-weight: bold; }

        .jaquette-container { width: 50%; aspect-ratio: 1/1; margin: 10px auto; background-image: url('https://lh3.googleusercontent.com/d/1vsktKnp28H1JwhJeORR-UJsuaT-UItjI'); background-size: cover; background-position: center; border: 2px solid #bc13fe; cursor: pointer; position: relative; z-index: 1; }
        #track-info { width: 100%; padding: 10px 15px; background: rgba(17, 17, 17, 0.7); box-sizing: border-box; text-align: center; }
        #current-title { font-size: 22px; margin: 0 0 5px 0; font-weight: bold; transition: opacity 0.5s; }
        #current-artist-album { font-size: 14px; margin: 0; color: #bc13fe; transition: opacity 0.5s; }
        .fade-out { opacity: 0; }
        .controls-container { width: 95%; margin: 10px auto; display: flex; align-items: center; gap: 10px; padding: 10px; background: #111; border-radius: 10px; box-sizing: border-box; }
        #play-pause-btn { background: #bc13fe; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        #play-pause-btn svg { width: 22px; height: 22px; fill: white; }
        #icon-pause { display: none; }
        #progress-bar { flex-grow: 1; accent-color: #bc13fe; cursor: pointer; }
        .track-list { width: 95%; margin: 10px auto; padding-bottom: 20px; }
        .track { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .track-info-text { cursor: pointer; flex-grow: 1; }
        .track h3 { margin: 0 0 5px 0; font-size: 16px; }
        .track p { margin: 0; font-size: 12px; color: #bc13fe; }
        .download-btn { background: none; border: none; cursor: pointer; padding: 5px; }
        .download-btn svg { width: 24px; height: 24px; fill: #bc13fe; }
        #lyrics-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: center; }
        #lyrics-content { font-size: 16px; line-height: 1.8; margin-top: 40px; white-space: pre-line; color: #ddd; }
        .close-lyrics { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: #bc13fe; }
    </style>
</head>
<body>
    <div id="lyrics-overlay"><span class="close-lyrics" onclick="toggleLyrics()">×</span><h2 id="lyrics-title" style="color: #bc13fe;">Paroles</h2><div id="lyrics-content"></div></div>
    
    <div class="container">
        <div class="header-sticky">
            <div class="header-sticky-blur"></div>
            <div class="share-btn" onclick="handleShare()"><svg width="26" height="26" viewBox="0 0 24 24" fill="#bc13fe"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg></div>
            
            <div class="like-btn" onclick="handleLikeClick()">
                <svg id="like-svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#bc13fe" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                <div id="like-counter">0</div>
            </div>

            <div class="jaquette-container" onclick="toggleLyrics()"></div>
            <div id="track-info"><h2 id="current-title">Dizzeur v1.5.8.1</h2><p id="current-artist-album">Hanaé</p></div>
            <div class="controls-container"><button id="play-pause-btn" onclick="togglePlay()"><svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button><input type="range" id="progress-bar" value="0" max="100"></div>
            <audio id="audio-element"></audio>
        </div>
        <div class="track-list" id="track-list"></div>
    </div>

    <script>
        const playlist = [
            { title: 'Bonne Fête Maman', album: 'Une Chanson Douce', url: 'https://archive.org/download/04-la-grace-de-la-fleur/01%20-%20HANAE%20-%20BONNE%20FETE%20MAMAN.mp3', lyrics: "J't'ai fait une chanson,\nune belle chanson\nMaman\nJ'ai gratté les cordes au médiator\nMaman\nSur ma guitare, j'y ai mis du cœur\nMaman\nPour que ça résonne, à toute heure\nMaman\n\nJe te souhaite\nune bonne fête des mamans\nMonte le son à fond du tourne-disque\nJe te souhaite\nune bonne fête des mamans\nJe t'aime très fort,\nfort comme ma musique\n\nJ'ai joué du piano et du xylo\nMaman\nSorti mon stylo et mon micro\nMaman\nJ'ai mis mon casque sur les oreilles\nMaman\nJ'ai mis le paquet dans ma belle voix\nMaman\n\nJe te souhaite\nune bonne fête des mamans\nMonte le son à fond du tourne-disque\nJe te souhaite\nune bonne fête des mamans\nJe t'aime très fort,\nfort comme ma musique\n\nGravé dans le noir, sur ce grand disque\nMaman\nPour toi je chante, je prends le risque\nMaman\nPose le diamant et écoute ma voix\nMaman\nC'est notre chanson, juste pour toi\nMaman\n\nJe te souhaite\nune bonne fête des mamans\nMonte le son à fond du tourne-disque\nJe te souhaite\nune bonne fête des mamans\nJe t'aime très fort,\nfort comme ma musique\n\nDans cette pochette noire,\nun beau vinyle\nC'est pour toi maman" },
            { title: 'Maman Je t\'aime', album: 'Une Chanson Douce', url: 'https://archive.org/download/04-la-grace-de-la-fleur/02%20-%20HANAE%20-%20MAMAN%20JE%20T%20AIME.mp3', lyrics: "J't'ai fait un dessin, un beau dessin\nMaman je t'aime\nPlein de petites fleurs et de p'tits cœurs\nMaman je t'aime\nJ'ai fait un mouton tout blanc, tout rond\nMaman je t'aime\nAvec des p'tits yeux\ntout ronds, tout bleus\nMaman je t'aime\nMaman, maman, maman, maman\n\nY a des papillons tout en couleurs\nMaman je t'aime\nY a des papillons sur chaque fleur\nMaman je t'aime\nJ'en ai mis tout plein dans mon dessin\nMaman je t'aime\nEt en majuscules\ndans une grosse bulle\nMaman je t'aime\nMaman, maman, maman, maman\n\nJ'ai mis des bisous dans mon dessin\nMaman je t'aime\nJ'en ai mis partout dans mon dessin\nMaman je t'aime\nJ'ai mis tout autour tout mon amour\nMaman je t'aime\nUn petit ruban, joli ruban\nJe t'aime maman\nMaman, maman, maman, maman\nUn petit ruban, joli ruban\nJe t'aime maman" },
            { title: 'Une Chanson Douce', album: 'Une Chanson Douce', url: 'https://archive.org/download/04-la-grace-de-la-fleur/03%20-%20HANAE%20-%20UNE%20CHANSON%20DOUCE.mp3', lyrics: "Une chanson douce\nQue me chantait ma maman\nEn suçant mon pouce\nJ'écoutais en m'endormant\nCette chanson douce\nJe veux la chanter pour toi\nCar ta peau est douce\nComme la mousse des bois\n\nLa petite biche est aux abois\nDans le bois, se cache le loup\nOuh, ouh, ouh, ouh\nMais le brave chevalier passa\nIl prit la biche dans ses bras\nLa, la, la, la\n\nLa petite biche\nCe sera toi, si tu veux\nLe loup, on s'en fiche\nContre lui, nous serons deux\nUne chanson douce\nPour tous les petits enfants\nUne chanson douce\nQue me chantait ma maman\n\nOh le joli conte que voilà\nLa biche, en femme, se changea\nLa, la, la, la\nEt dans les bras du beau chevalier\nBelle princesse elle est restée\nÀ tout jamais\n\nUne chanson douce\nQue me chantait ma maman\nEn suçant mon pouce\nJ'écoutais en m'endormant\nCette chanson douce\nJe veux la chanter aussi\nPour toi, oh ma douce\nJusqu'à la fin de ma vie\nJusqu'à la fin de ma vie\nJusqu'à la fin de ma vie" },
            { title: 'La Grâce de la Fleur', album: 'Une Chanson Douce', url: 'https://archive.org/download/04-la-grace-de-la-fleur/04%20-%20LA%20GRACE%20DE%20LA%20FLEUR.mp3', lyrics: "Un souffle pur,\nau creux d'un grand silence,\nUn havre doux, une immense présence.\nDe ce refuge, jaillit un feu constant,\nUne chaleur, pour un élan vibrant.\n\nJe suis l'éclat, d'un soleil de printemps,\nJe trouve là, un amour de géant.\n\nVers cet éclat, court un fleuve de vie,\nUn chant puissant,\npour une force infinie.\nDans ce voyage,\ns'ouvre une seule maison,\nUne racine, au bout de l'horizon.\n\nJe deviens fleur, au creux de ce jardin,\nJe perds la peur, en serrant cette main.\n\nUn cycle pur, de la terre au sommet,\nJe reste là, pour la vie, à jamais.\nPour la vie, à jamais...\nPour la vie, à jamais...\nPour la vie, à jamais...\nPour la vie, à jamais." }
        ];

        const audio = document.getElementById('audio-element');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const progressBar = document.getElementById('progress-bar');
        const currentTitle = document.getElementById('current-title');
        const currentArtistAlbum = document.getElementById('current-artist-album');
        const counterDisplay = document.getElementById('like-counter');
        const likeSvg = document.getElementById('like-svg');
        let currentIndex = parseInt(localStorage.getItem('dizzeur_index')) || 0;

        const API_KEY = "dizzeur_v152_hanae";
        const API_BASE = "https://api.countapi.xyz";

        async function fetchLikes() {
            try {
                const res = await fetch(`${API_BASE}/get/${API_KEY}/likes`);
                const data = await res.json();
                if (data.value !== undefined) counterDisplay.innerText = data.value;
                if (localStorage.getItem('dizzeur_liked')) likeSvg.style.fill = "#bc13fe";
            } catch(e) { console.log("Erreur de lecture"); }
        }

        async function handleLikeClick() {
            const isLiked = localStorage.getItem('dizzeur_liked');
            const action = isLiked ? "update?amount=-1" : "hit";
            
            try {
                const res = await fetch(`${API_BASE}/${action}/${API_KEY}/likes`);
                const data = await res.json();
                if (data.value !== undefined) {
                    counterDisplay.innerText = data.value;
                    if (isLiked) {
                        localStorage.removeItem('dizzeur_liked');
                        likeSvg.style.fill = "none";
                    } else {
                        localStorage.setItem('dizzeur_liked', 'true');
                        likeSvg.style.fill = "#bc13fe";
                    }
                }
            } catch(e) { 
                let val = parseInt(counterDisplay.innerText);
                counterDisplay.innerText = isLiked ? val - 1 : val + 1;
                if (isLiked) { localStorage.removeItem('dizzeur_liked'); likeSvg.style.fill = "none"; }
                else { localStorage.setItem('dizzeur_liked', 'true'); likeSvg.style.fill = "#bc13fe"; }
            }
        }

        function playTrack(index, startTime = 0) {
            currentIndex = index;
            const track = playlist[index];
            localStorage.setItem('dizzeur_index', currentIndex);
            currentTitle.classList.add('fade-out');
            currentArtistAlbum.classList.add('fade-out');
            setTimeout(() => {
                audio.src = track.url;
                currentTitle.innerText = track.title;
                currentArtistAlbum.innerText = "Hanaé - " + track.album;
                currentTitle.classList.remove('fade-out');
                currentArtistAlbum.classList.remove('fade-out');
                audio.currentTime = startTime;
                if (startTime === 0 || !audio.paused) { audio.play(); iconPlay.style.display = "none"; iconPause.style.display = "block"; }
            }, 500);
        }

        function togglePlay() { 
            if (audio.paused) { audio.play(); iconPlay.style.display = "none"; iconPause.style.display = "block"; } 
            else { audio.pause(); iconPlay.style.display = "block"; iconPause.style.display = "none"; }
        }

        function handleShare() { if (navigator.share) navigator.share({ title: 'Dizzeur', url: window.location.href }); }

        playlist.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = 'track';
            div.innerHTML = `<div class="track-info-text" onclick="playTrack(${index})"><h3>${track.title}</h3><p>Hanaé</p></div><a href="${track.url}" download class="download-btn"><svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg></a>`;
            document.getElementById('track-list').appendChild(div);
        });

        audio.ontimeupdate = () => { if (audio.duration) progressBar.value = (audio.currentTime / audio.duration) * 100; };
        progressBar.oninput = () => { audio.currentTime = (progressBar.value / 100) * audio.duration; };

        window.onload = () => { fetchLikes(); playTrack(currentIndex); };

        function toggleLyrics() {
            const overlay = document.getElementById('lyrics-overlay');
            if (overlay.style.display === 'block') overlay.style.display = 'none';
            else { document.getElementById('lyrics-content').innerText = playlist[currentIndex].lyrics; document.getElementById('lyrics-title').innerText = playlist[currentIndex].title; overlay.style.display = 'block'; }
        }
        audio.onended = () => { if (currentIndex < playlist.length - 1) playTrack(currentIndex + 1); };
    </script>
</body>
</html>
