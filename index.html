<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hanaé - TreeFlow Music</title>
    <style>
        :root { --violet: #cc00ff; --rose: #ff00cc; --noir: #000; }
        body { background-color: var(--noir); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        .top-banner { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; transition: filter 1s; }
        .header { padding: 15px 20px 5px; }
        h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -1px; }
        
        .actions { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-top: 10px; }
        .btn-like { background: rgba(30,0,50,0.9); border: 2px solid var(--violet); border-radius: 25px; padding: 10px 22px; color: var(--violet); font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-like.liked { background: var(--rose); border-color: var(--rose); color: white; box-shadow: 0 0 15px var(--rose); }
        
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .btn-control { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .btn-play-main { width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(135deg, var(--violet), var(--rose)); border: none; color: white; font-size: 24px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-play-main.playing::before { content: 'II'; font-weight: bold; }
        .btn-play-main:not(.playing)::before { content: '▶'; margin-left: 4px; }

        section { padding: 30px 20px 10px; position: relative; }
        h2 { color: var(--violet); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
        
        .track { display: flex; align-items: center; background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-radius: 12px; border: 1px solid transparent; transition: all 0.3s; }
        .track.active { background: rgba(255, 0, 204, 0.12); border-color: var(--rose); }
        .track-num { color: var(--violet); width: 30px; font-weight: 900; }
        .track-name { flex: 1; font-weight: 500; }

        .album-scroll-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .album-scroll-container::-webkit-scrollbar { display: none; }
        .album-card { flex: 0 0 170px; text-decoration: none; color: inherit; display: block; transition: filter 1s; }
        .cover { width: 170px; height: 170px; border-radius: 18px; background-image: url('https://lh3.googleusercontent.com/d/1vsktKnp28H1JwhJeORR-UJsuaT-UItjI'); background-size: cover; display: flex; justify-content: flex-end; align-items: flex-end; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .mini-play { background: var(--violet); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: white; }

        /* FLOU & BLOCAGE */
        .is-waiting .top-banner { filter: blur(8px) brightness(0.7); }
        .is-waiting .track, .is-waiting .album-card { filter: blur(5px); opacity: 0.5; pointer-events: none; }
        .lock-overlay { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); border: 1px solid var(--violet); padding: 12px 25px;
            border-radius: 25px; color: var(--violet); font-weight: bold; font-size: 0.75rem; z-index: 10;
        }
        .is-waiting .lock-overlay { display: block; }

        .comment-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .comment-input, .comment-pseudo { width: 100%; background: #222; border: 1px solid #444; border-radius: 8px; color: white; padding: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .comment-btn { background: var(--violet); border: none; color: white; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .comment-btn:disabled { background: #333; cursor: not-allowed; }
        #comments-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .comment-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--violet); }
    </style>
</head>
<body class="is-waiting">

    <img src="https://lh3.googleusercontent.com/d/14Okj_dpj2lA_mTE1x-1Tbsh3nFgwrkyc" class="top-banner">
    <div class="header"><h1>Hanaé</h1></div>

    <div class="actions">
        <div class="btn-like" id="btnLike">❤️ <span id="likeCount">...</span></div>
        <div class="player-controls">
            <button class="btn-control" onclick="prevTrack()">⏮</button>
            <button class="btn-play-main" id="mainPlayBtn" onclick="togglePlay()"></button>
            <button class="btn-control" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <section>
        <h2>Le Top 3</h2>
        <div class="lock-overlay">ÉVÉNEMENT LE 31 MAI</div>
        <div id="track-list"></div>
    </section>

    <section>
        <h2>Discographie</h2>
        <div class="lock-overlay">BIENTÔT DISPONIBLE</div>
        <div class="album-scroll-container">
            <a href="#" id="album-link-1" class="album-card">
                <div class="cover"><div class="mini-play">▶</div></div>
                <span style="font-weight:bold; margin-top:10px; display:block;">Une Chanson Douce</span>
            </a>
            <a href="#" id="album-link-2" class="album-card">
                <div class="cover"><div class="mini-play">▶</div></div>
                <span style="font-weight:bold; margin-top:10px; display:block;">Une Chanson Douce - Instru</span>
            </a>
        </div>
    </section>

    <section>
        <h2>Livre d'or</h2>
        <div class="comment-box">
            <input type="text" id="pseudo" class="comment-pseudo" placeholder="Livre d'or verrouillé" readonly>
            <textarea id="comment" class="comment-input" placeholder="Revenez le 31 mai pour laisser un message." rows="3" readonly></textarea>
            <button class="comment-btn" id="sendComment" disabled>Indisponible</button>
            <div id="comments-list"></div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8K0QUGr3xUSra2q_feHGrAjt0qAfrKY8",
            authDomain: "treeflow-music.firebaseapp.com",
            projectId: "treeflow-music",
            storageBucket: "treeflow-music.firebasestorage.app",
            messagingSenderId: "330986852150",
            appId: "1:330986852150:web:d57958930fa75b9504ad97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const DATE_CIBLE = new Date('2026-04-23T00:00:00').getTime();
        const estDisponible = () => Date.now() >= DATE_CIBLE;

        const audio = document.getElementById('audioPlayer');
        const mainBtn = document.getElementById('mainPlayBtn');
        const likeBtn = document.getElementById('btnLike');
        const listContainer = document.getElementById('track-list');
        const likeRef = doc(db, "stats", "likes");
        let currentTrackIndex = 0;

        const allTracks = [
            { title: 'Une Chanson Douce', url: 'https://archive.org/download/04-la-grace-de-la-fleur/03%20-%20HANAE%20-%20UNE%20CHANSON%20DOUCE.mp3', artist: 'Hanaé' },
            { title: 'La Grâce de la Fleur', url: 'https://archive.org/download/04-la-grace-de-la-fleur/04%20-%20LA%20GRACE%20DE%20LA%20FLEUR.mp3', artist: 'Hanaé' },
            { title: 'Bonne Fête Maman', url: 'https://archive.org/download/04-la-grace-de-la-fleur/01%20-%20HANAE%20-%20BONNE%20FETE%20MAMAN.mp3', artist: 'Hanaé' }
        ];

        function updateMediaSession(track) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.title,
                    artist: track.artist,
                    artwork: [{ src: 'https://lh3.googleusercontent.com/d/14Okj_dpj2lA_mTE1x-1Tbsh3nFgwrkyc', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => togglePlay());
                navigator.mediaSession.setActionHandler('pause', () => togglePlay());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
            }
        }

        const updateDisplay = () => {
            listContainer.innerHTML = "";
            allTracks.forEach((t, i) => {
                const activeClass = (i === currentTrackIndex && !audio.paused) ? 'active' : '';
                listContainer.innerHTML += `<div class="track ${activeClass}" onclick="jouer(${i})"><span class="track-num">${i+1}</span><span class="track-name">${t.title}</span></div>`;
            });

            if(estDisponible()){
                document.body.classList.remove('is-waiting');
                const p = document.getElementById('pseudo');
                const c = document.getElementById('comment');
                const b = document.getElementById('sendComment');
                p.readOnly = false; p.placeholder = "Ton pseudo...";
                c.readOnly = false; c.placeholder = "Ton message...";
                b.disabled = false; b.innerText = "Poster le message";
                document.getElementById('album-link-1').href = "album_hanaé.html";
                document.getElementById('album-link-2').href = "album_hanaé_instru.html";
            }
        };

        // --- GESTION LIKE ---
        likeBtn.onclick = async () => {
            if(!estDisponible()) return;
            if (!localStorage.getItem('hanae_liked')) {
                await updateDoc(likeRef, { count: increment(1) });
                localStorage.setItem('hanae_liked', 'true');
                likeBtn.classList.add('liked');
            }
        };
        if(localStorage.getItem('hanae_liked')) likeBtn.classList.add('liked');

        onSnapshot(likeRef, snap => { if(snap.exists()) document.getElementById('likeCount').innerText = snap.data().count; });

        // --- LECTEUR ---
        window.jouer = (i) => {
            if(!estDisponible()) return;
            currentTrackIndex = i;
            audio.src = allTracks[i].url;
            audio.play();
            mainBtn.classList.add('playing');
            updateMediaSession(allTracks[i]);
            updateDisplay();
        };

        window.togglePlay = () => {
            if(!estDisponible()) return;
            if (audio.src === "") { jouer(0); return; }
            audio.paused ? audio.play() : audio.pause();
            mainBtn.classList.toggle('playing', !audio.paused);
            updateDisplay();
        };

        window.nextTrack = () => { if(estDisponible()) jouer((currentTrackIndex + 1) % allTracks.length); };
        window.prevTrack = () => { if(estDisponible()) jouer((currentTrackIndex - 1 + allTracks.length) % allTracks.length); };
        audio.onended = () => nextTrack();

        // --- COMMENTAIRES ---
        document.getElementById('sendComment').onclick = async () => {
            const pseudo = document.getElementById('pseudo').value;
            const texte = document.getElementById('comment').value;
            if(!pseudo || !texte) return;
            await addDoc(collection(db, "comments"), { pseudo, text: texte, date: serverTimestamp() });
            document.getElementById('comment').value = "";
        };

        onSnapshot(query(collection(db, "comments"), orderBy("date", "desc")), snap => {
            const list = document.getElementById('comments-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                list.innerHTML += `<div class="comment-item"><b>${doc.data().pseudo}</b><br>${doc.data().text}</div>`;
            });
        });

        updateDisplay();
        setInterval(updateDisplay, 10000);
    </script>
</body>
</html>
