<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hanaé - TreeFlow Music</title>
    <style>
        :root { --violet: #cc00ff; --rose: #ff00cc; --noir: #000; }
        body { background-color: var(--noir); color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 60px; }
        .top-banner { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
        .header { padding: 15px 20px; }
        h1 { font-size: 3rem; margin: 0; font-weight: 900; }
        
        .actions { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-top: 10px; }
        .btn-like { background: rgba(30,0,50,0.9); border: 1px solid var(--violet); border-radius: 25px; padding: 10px 20px; color: var(--violet); font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .btn-control { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .btn-play-main { width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(135deg, var(--violet), var(--rose)); border: none; color: white; font-size: 24px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-play-main.playing::before { content: 'II'; }
        .btn-play-main:not(.playing)::before { content: '▶'; margin-left: 4px; }

        section { padding: 30px 20px 10px; }
        h2 { color: var(--violet); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; }
        .track { display: flex; align-items: center; background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; }
        .track.active { background: rgba(204, 0, 255, 0.15); border-color: var(--violet); }
        .track-num { color: var(--violet); width: 30px; font-weight: 900; }
        
        .album-scroll-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .album-card { flex: 0 0 170px; text-decoration: none; color: inherit; }
        .cover { width: 170px; height: 170px; border-radius: 18px; background-image: url('https://lh3.googleusercontent.com/d/1vsktKnp28H1JwhJeORR-UJsuaT-UItjI'); background-size: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; justify-content: flex-end; align-items: flex-end; padding: 12px; }
        .mini-play { background: var(--violet); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <img src="https://lh3.googleusercontent.com/d/14Okj_dpj2lA_mTE1x-1Tbsh3nFgwrkyc" class="top-banner">
    <div class="header"><h1>Hanaé</h1></div>

    <div class="actions">
        <div class="btn-like" id="btnLike">
            ❤️ <span id="likeCount">...</span>
        </div>
        <div class="player-controls">
            <button class="btn-control" onclick="prevTrack()">⏮</button>
            <button class="btn-play-main" id="mainPlayBtn" onclick="togglePlay()"></button>
            <button class="btn-control" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <audio id="audioPlayer" onended="nextTrack()"></audio>

    <section>
        <h2>Les plus écoutés</h2>
        <div id="track-list"></div>
    </section>

    <section>
        <h2>Discographie</h2>
        <div class="album-scroll-container">
            <div class="album-card">
                <div class="cover"><div class="mini-play">▶</div></div>
                <span style="font-weight:bold; margin-top:10px; display:block;">Une Chanson Douce</span>
            </div>
            <div class="album-card">
                <div class="cover"><div class="mini-play">▶</div></div>
                <span style="font-weight:bold; margin-top:10px; display:block;">Une Chanson Douce - Instru</span>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8K0QUGr3xUSra2q_feHGrAjt0qAfrKY8",
            authDomain: "treeflow-music.firebaseapp.com",
            projectId: "treeflow-music",
            storageBucket: "treeflow-music.firebasestorage.app",
            messagingSenderId: "330986852150",
            appId: "1:330986852150:web:d57958930fa75b9504ad97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const likeRef = doc(db, "stats", "likes");

        // Écouter les likes en temps réel
        onSnapshot(likeRef, (docSnap) => {
            if (docSnap.exists()) {
                document.getElementById('likeCount').innerText = docSnap.data().count;
            }
        });

        // Fonction pour ajouter un like (attachée à la fenêtre pour être accessible via onclick)
        window.ajouterLike = async () => {
            await updateDoc(likeRef, {
                count: increment(1)
            });
        };
        document.getElementById('btnLike').onclick = window.ajouterLike;
    </script>

    <script>
        const playlist = [
            { title: 'Une Chanson Douce', url: 'https://archive.org/download/04-la-grace-de-la-fleur/03%20-%20HANAE%20-%20UNE%20CHANSON%20DOUCE.mp3' },
            { title: 'La Grâce de la Fleur', url: 'https://archive.org/download/04-la-grace-de-la-fleur/04%20-%20LA%20GRACE%20DE%20LA%20FLEUR.mp3' },
            { title: 'Bonne Fête Maman', url: 'https://archive.org/download/04-la-grace-de-la-fleur/01%20-%20HANAE%20-%20BONNE%20FETE%20MAMAN.mp3' },
            { title: 'Maman Je t\'aime', url: 'https://archive.org/download/04-la-grace-de-la-fleur/02%20-%20HANAE%20-%20MAMAN%20JE%20T%20AIME.mp3' }
        ];

        let currentTrackIndex = -1;
        const player = document.getElementById('audioPlayer');
        const mainBtn = document.getElementById('mainPlayBtn');
        const list = document.getElementById('track-list');

        playlist.forEach((t, i) => {
            list.innerHTML += `<div class="track" id="track-${i}" onclick="jouer(${i})"><span class="track-num">${i+1}</span><span>${t.title}</span></div>`;
        });

        window.jouer = (i) => {
            if (currentTrackIndex !== -1) document.getElementById(`track-${currentTrackIndex}`).classList.remove('active');
            currentTrackIndex = i;
            player.src = playlist[i].url;
            player.play();
            document.getElementById(`track-${i}`).classList.add('active');
            mainBtn.classList.add('playing');
        };

        window.togglePlay = () => {
            if (currentTrackIndex === -1) { jouer(0); return; }
            if (player.paused) { player.play(); mainBtn.classList.add('playing'); }
            else { player.pause(); mainBtn.classList.remove('playing'); }
        };

        window.nextTrack = () => jouer((currentTrackIndex + 1) % playlist.length);
        window.prevTrack = () => jouer((currentTrackIndex - 1 + playlist.length) % playlist.length);
    </script>
</body>
</html>
