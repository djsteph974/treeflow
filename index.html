<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hanaé - Une Chanson Douce</title>
    <style>
        :root {
            --violet: #cc00ff;
            --rose: #ff00cc;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
        }

        .top-banner {
            width: 100%;
            display: block;
        }

        .header {
            height: auto;
            display: flex;
            align-items: flex-end;
            padding: 10px 20px;
            background-color: #000;
            position: relative;
            z-index: 5;
        }

        h1 { 
            font-size: 3rem; 
            margin: 0; 
            font-weight: 900; 
            line-height: 1;
        }

        /* ACTIONS & CONTRÔLES */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            margin-top: 10px; 
            position: relative;
            z-index: 10;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-control {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-control:active { color: var(--violet); }

        .btn-play-main {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--violet), var(--rose));
            border: none;
            color: transparent;
            font-size: 0;
            box-shadow: 0 0 20px rgba(204, 0, 255, 0.4);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            position: relative;
        }

        .btn-play-main::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 4px;
        }

        .btn-play-main.playing::after { display: none; }

        .btn-play-main.playing::before {
            content: '';
            position: absolute;
            display: block;
            width: 18px;
            height: 22px;
            background: repeating-linear-gradient(to right, #ffffff, #ffffff 6px, transparent 6px, transparent 12px, #ffffff 12px, #ffffff 18px);
        }

        .btn-play-main:active { transform: scale(0.92); }

        .btn-like {
            background: rgba(30, 0, 50, 0.9);
            border: 1px solid var(--violet);
            border-radius: 20px;
            padding: 8px 18px;
            color: var(--violet);
            font-weight: bold;
        }

        /* LISTE DES TITRES */
        section { padding: 30px 20px 10px 20px; }
        h2 { color: var(--violet); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 15px; }

        .track {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;
            padding: 14px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .track.active {
            background: rgba(204, 0, 255, 0.1);
            border-color: var(--violet);
            box-shadow: 0 0 15px rgba(204, 0, 255, 0.3);
        }

        .track-num { color: var(--violet); width: 30px; font-weight: 900; }
        .track-name { flex: 1; font-weight: 500; }

        /* DISCOGRAPHIE AVEC DÉFILEMENT */
        .album-scroll-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none; /* Firefox */
        }

        .album-scroll-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .album-link {
            text-decoration: none;
            color: inherit;
            display: inline-block;
            flex: 0 0 170px; /* Taille fixe pour le défilement */
        }

        .album-card { width: 170px; margin-top: 10px; }
        .cover {
            width: 170px;
            height: 170px;
            border-radius: 18px;
            background: url('https://lh3.googleusercontent.com/d/1vsktKnp28H1JwhJeORR-UJsuaT-UItjI');
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }

        .album-card:active .cover { transform: scale(0.98); }

        .mini-play { background: var(--violet); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: #fff; }
        .album-title { font-weight: bold; margin-top: 12px; display: block; line-height: 1.2; }
    </style>
</head>
<body>

    <img src="https://lh3.googleusercontent.com/d/14Okj_dpj2lA_mTE1x-1Tbsh3nFgwrkyc" alt="Bannière" class="top-banner">

    <div class="header">
        <h1>Hanaé</h1>
    </div>

    <div class="actions">
        <div class="btn-like">❤️ 1.2k</div>
        
        <div class="player-controls">
            <button class="btn-control" onclick="prevTrack()">⏮</button>
            <button class="btn-play-main" id="mainPlayBtn" onclick="togglePlay()">▶</button>
            <button class="btn-control" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <audio id="audioPlayer" onended="nextTrack()"></audio>

    <section>
        <h2>Les plus écoutés</h2>
        <div class="track" id="track-0" onclick="jouer(0)">
            <span class="track-num">1</span>
            <span class="track-name">Une Chanson Douce</span>
        </div>
        <div class="track" id="track-1" onclick="jouer(1)">
            <span class="track-num">2</span>
            <span class="track-name">La Grâce de la Fleur</span>
        </div>
        <div class="track" id="track-2" onclick="jouer(2)">
            <span class="track-num">3</span>
            <span class="track-name">Bonne Fête Maman</span>
        </div>
        <div class="track" id="track-3" onclick="jouer(3)">
            <span class="track-num">4</span>
            <span class="track-name">Maman je t'aime</span>
        </div>
    </section>

    <section>
        <h2>Discographie</h2>
        <div class="album-scroll-container">
            <a href="album_hanaé.html" class="album-link">
                <div class="album-card">
                    <div class="cover"><div class="mini-play">▶</div></div>
                    <span class="album-title">Une Chanson Douce</span>
                </div>
            </a>

            <a href="album_hanaé_instru.html" class="album-link">
                <div class="album-card">
                    <div class="cover"><div class="mini-play">▶</div></div>
                    <span class="album-title">Une Chanson Douce - Instru</span>
                </div>
            </a>
        </div>
    </section>

    <script>
        const playlist = [
            { title: 'Une Chanson Douce', url: 'https://archive.org/download/04-la-grace-de-la-fleur/03%20-%20HANAE%20-%20UNE%20CHANSON%20DOUCE.mp3' },
            { title: 'La Grâce de la Fleur', url: 'https://archive.org/download/04-la-grace-de-la-fleur/04%20-%20LA%20GRACE%20DE%20LA%20FLEUR.mp3' },
            { title: 'Bonne Fête Maman', url: 'https://archive.org/download/04-la-grace-de-la-fleur/01%20-%20HANAE%20-%20BONNE%20FETE%20MAMAN.mp3' },
            { title: 'Maman Je t\'aime', url: 'https://archive.org/download/04-la-grace-de-la-fleur/02%20-%20HANAE%20-%20MAMAN%20JE%20T%20AIME.mp3' }
        ];

        let currentTrackIndex = -1;
        const player = document.getElementById('audioPlayer');
        const mainBtn = document.getElementById('mainPlayBtn');

        function jouer(index) {
            if (index < 0 || index >= playlist.length) return;
            if (currentTrackIndex !== -1) {
                document.getElementById(`track-${currentTrackIndex}`).classList.remove('active');
            }
            currentTrackIndex = index;
            player.src = playlist[currentTrackIndex].url;
            player.play();
            document.getElementById(`track-${currentTrackIndex}`).classList.add('active');
            mainBtn.classList.add('playing');
        }

        function togglePlay() {
            if (currentTrackIndex === -1) {
                jouer(0);
                return;
            }
            if (player.paused) {
                player.play();
                mainBtn.classList.add('playing');
            } else {
                player.pause();
                mainBtn.classList.remove('playing');
            }
        }

        function nextTrack() {
            let next = currentTrackIndex + 1;
            if (next < playlist.length) {
                jouer(next);
            } else {
                jouer(0);
            }
        }

        function prevTrack() {
            let prev = currentTrackIndex - 1;
            if (prev >= 0) {
                jouer(prev);
            } else {
                jouer(playlist.length - 1);
            }
        }
    </script>
</body>
</html>
