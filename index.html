<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hanaé - TreeFlow Music</title>
    <style>
        :root { --violet: #cc00ff; --rose: #ff00cc; --noir: #000; }
        body { background-color: var(--noir); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        .top-banner { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
        .header { padding: 15px 20px; }
        h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -1px; }
        
        .actions { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-top: 10px; }
        
        .btn-like { 
            background: rgba(30,0,50,0.9); 
            border: 2px solid var(--violet); 
            border-radius: 25px; 
            padding: 10px 22px; 
            color: var(--violet); 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-like.liked {
            background: var(--rose);
            border-color: var(--rose);
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.5);
            transform: scale(1.05);
        }
        
        .player-controls { display: flex; align-items: center; gap: 15px; }
        .btn-control { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .btn-play-main { width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(135deg, var(--violet), var(--rose)); border: none; color: white; font-size: 24px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(204, 0, 255, 0.4); }
        .btn-play-main.playing::before { content: 'II'; font-weight: bold; }
        .btn-play-main:not(.playing)::before { content: '▶'; margin-left: 4px; }

        section { padding: 30px 20px 10px; }
        h2 { color: var(--violet); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }
        
        .track { display: flex; align-items: center; background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .track.active { background: rgba(204, 0, 255, 0.15); border-color: var(--violet); }
        .track-num { color: var(--violet); width: 30px; font-weight: 900; }
        .track-name { flex: 1; font-weight: 500; }

        .album-scroll-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .album-scroll-container::-webkit-scrollbar { display: none; }
        .album-card { flex: 0 0 170px; text-decoration: none; color: inherit; display: block; }
        .cover { width: 170px; height: 170px; border-radius: 18px; background-image: url('https://lh3.googleusercontent.com/d/1vsktKnp28H1JwhJeORR-UJsuaT-UItjI'); background-size: cover; display: flex; justify-content: flex-end; align-items: flex-end; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .mini-play { background: var(--violet); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <img src="https://lh3.googleusercontent.com/d/14Okj_dpj2lA_mTE1x-1Tbsh3nFgwrkyc" class="top-banner">
    <div class="header"><h1>Hanaé</h1></div>

    <div class="actions">
        <div class="btn-like" id="btnLike">
            <span id="heartIcon">❤️</span> <span id="likeCount">...</span>
        </div>
        
        <div class="player-controls">
            <button class="btn-control" onclick="prevTrack()">⏮</button>
            <button class="btn-play-main" id="mainPlayBtn" onclick="togglePlay()"></button>
            <button class="btn-control" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <audio id="audioPlayer" onended="nextTrack()"></audio>

    <section>
        <h2>Les plus écoutés</h2>
        <div id="track-list"></div>
    </section>

    <section>
        <h2>Discographie</h2>
        <div class="album-scroll-container">
            <a href="album_hanaé.html" class="album-card">
                <div class="cover"><div class="mini-play">▶</div></div>
                <span style="font-weight:bold; margin-top:10px; display:block;">Une Chanson Douce</span>
            </a>
            <a href="album_hanaé_instru.html" class="album-card">
                <div class="cover"><div class="mini-play">▶</div></div>
                <span style="font-weight:bold; margin-top:10px; display:block;">Une Chanson Douce - Instru</span>
            </a>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8K0QUGr3xUSra2q_feHGrAjt0qAfrKY8",
            authDomain: "treeflow-music.firebaseapp.com",
            projectId: "treeflow-music",
            storageBucket: "treeflow-music.firebasestorage.app",
            messagingSenderId: "330986852150",
            appId: "1:330986852150:web:d57958930fa75b9504ad97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const likeRef = doc(db, "stats", "likes");
        const statsDouceRef = doc(db, "stats", "track_stats_douce");
        const statsInstruRef = doc(db, "stats", "track_stats_douce_instru");

        const likeBtn = document.getElementById('btnLike');
        const audio = document.getElementById('audioPlayer');
        const mainBtn = document.getElementById('mainPlayBtn');
        const listContainer = document.getElementById('track-list');

        // Base de données complète pour le calcul du Top 5
        const allTracks = [
            { id: 'chanson_douce', title: 'Une Chanson Douce', url: 'https://archive.org/download/04-la-grace-de-la-fleur/03%20-%20HANAE%20-%20UNE%20CHANSON%20DOUCE.mp3', type: 'normal' },
            { id: 'grace_fleur', title: 'La Grâce de la Fleur', url: 'https://archive.org/download/04-la-grace-de-la-fleur/04%20-%20LA%20GRACE%20DE%20LA%20FLEUR.mp3', type: 'normal' },
            { id: 'bonne_fete', title: 'Bonne Fête Maman', url: 'https://archive.org/download/04-la-grace-de-la-fleur/01%20-%20HANAE%20-%20BONNE%20FETE%20MAMAN.mp3', type: 'normal' },
            { id: 'maman_je_taime', title: 'Maman Je t\'aime', url: 'https://archive.org/download/04-la-grace-de-la-fleur/02%20-%20HANAE%20-%20MAMAN%20JE%20T%20AIME.mp3', type: 'normal' },
            { id: 'chanson_douce', title: 'Une Chanson Douce (Instru)', url: 'https://archive.org/download/04-la-grace-de-la-fleur/03%20-%20HANAE%20-%20UNE%20CHANSON%20DOUCE.mp3', type: 'instru' },
            { id: 'grace_fleur', title: 'La Grâce de la Fleur (Instru)', url: 'https://archive.org/download/04-la-grace-de-la-fleur/04%20-%20LA%20GRACE%20DE%20LA%20FLEUR.mp3', type: 'instru' },
            { id: 'bonne_fete', title: 'Bonne Fête Maman (Instru)', url: 'https://archive.org/download/04-la-grace-de-la-fleur/01%20-%20HANAE%20-%20BONNE%20FETE%20MAMAN.mp3', type: 'instru' },
            { id: 'maman_je_taime', title: 'Maman Je t\'aime (Instru)', url: 'https://archive.org/download/04-la-grace-de-la-fleur/02%20-%20HANAE%20-%20MAMAN%20JE%20T%20AIME.mp3', type: 'instru' }
        ];

        let currentTop5 = [];
        let currentIndex = -1;
        let statsData = { normal: {}, instru: {} };

        // --- MISE À JOUR ET TRI DU TOP 5 ---
        const updateDisplay = () => {
            const scoredTracks = allTracks.map(track => ({
                ...track,
                plays: statsData[track.type][track.id] || 0
            }));

            // Tri par nombre d'écoutes décroissant
            currentTop5 = scoredTracks.sort((a, b) => b.plays - a.plays).slice(0, 5);

            listContainer.innerHTML = "";
            currentTop5.forEach((t, i) => {
                const activeClass = (currentIndex === i) ? 'active' : '';
                listContainer.innerHTML += `
                    <div class="track ${activeClass}" id="t-${i}" onclick="jouer(${i})">
                        <span class="track-num">${i+1}</span>
                        <span class="track-name">${t.title}</span>
                    </div>`;
            });
        };

        // --- ECOUTE DES STATS FIREBASE ---
        onSnapshot(statsDouceRef, (snap) => {
            if (snap.exists()) { statsData.normal = snap.data(); updateDisplay(); }
        });
        onSnapshot(statsInstruRef, (snap) => {
            if (snap.exists()) { statsData.instru = snap.data(); updateDisplay(); }
        });

        // --- SYNCHRO LIKES ---
        if(localStorage.getItem('hanae_liked')) likeBtn.classList.add('liked');
        onSnapshot(likeRef, (snap) => {
            if (snap.exists()) document.getElementById('likeCount').innerText = snap.data().count;
        });

        window.lancerLike = async () => {
            if (!localStorage.getItem('hanae_liked')) {
                try {
                    await updateDoc(likeRef, { count: increment(1) });
                    localStorage.setItem('hanae_liked', 'true');
                    likeBtn.classList.add('liked');
                } catch (e) { console.error("Firebase Error", e); }
            }
        };
        likeBtn.onclick = window.lancerLike;

        // --- LOGIQUE LECTEUR ---
        window.jouer = async (i) => {
            currentIndex = i;
            const track = currentTop5[i];
            
            const ref = track.type === 'normal' ? statsDouceRef : statsInstruRef;
            try {
                await updateDoc(ref, { [track.id]: increment(1) });
            } catch(e) { console.error("Erreur stats", e); }

            audio.src = track.url;
            audio.play();
            mainBtn.classList.add('playing');
            updateDisplay(); 
        };

        window.togglePlay = () => {
            if (currentIndex === -1) { window.jouer(0); return; }
            if (audio.paused) { audio.play(); mainBtn.classList.add('playing'); }
            else { audio.pause(); mainBtn.classList.remove('playing'); }
        };

        window.nextTrack = () => window.jouer((currentIndex + 1) % currentTop5.length);
        window.prevTrack = () => window.jouer((currentIndex - 1 + currentTop5.length) % currentTop5.length);
    </script>
</body>
</html>
